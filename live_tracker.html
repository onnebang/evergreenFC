<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>에버그린 FC 전술 보드 & 트래커</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            margin: 0;
            height: 100vh;
            display: flex;
            box-sizing: border-box;
            user-select: none;
            overflow: hidden;
        }

        /* 3단 레이아웃 구조 */
        .layout-left { width: 20%; background: #2d3748; padding: 15px; border-right: 2px solid #4a5568; display: flex; flex-direction: column; }
        .layout-center { width: 50%; background: #276749; position: relative; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .layout-right { width: 30%; background: #1a202c; padding: 15px; border-left: 2px solid #4a5568; display: flex; flex-direction: column; }

        /* 공통 헤더 */
        h2 { font-size: 16px; color: #ecc94b; margin-top: 0; text-align: center; border-bottom: 1px solid #4a5568; padding-bottom: 10px; }

        /* 1. Left: 벤치 자원 */
        .bench-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .player-card {
            background: #4a5568; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; cursor: grab; transition: 0.2s;
        }
        .player-card:active { cursor: grabbing; opacity: 0.7; }

        /* 2. Center: 경기장 (Pitch) */
        .pitch {
            width: 90%; height: 80%; background: #2f855a; border: 2px solid white; position: relative; border-radius: 5px;
            /* 간단한 경기장 라인 드로잉 */
            background-image: 
                linear-gradient(to bottom, transparent 49.5%, white 49.5%, white 50.5%, transparent 50.5%),
                radial-gradient(circle at 50% 50%, transparent 15%, white 15%, white 16%, transparent 16%);
        }
        .pitch-dropzone { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        
        /* 경기장 위 선수 토큰 */
        .player-token {
            width: 40px; height: 40px; background: #ecc94b; color: #1a202c; border-radius: 50%;
            position: absolute; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900;
            transform: translate(-50%, -50%); cursor: pointer; border: 2px solid #2d3748;
        }
        .player-token.selected { background: #e53e3e; color: white; border-color: white; transform: translate(-50%, -50%) scale(1.2); z-index: 10; }
        .token-pos { position: absolute; bottom: -18px; font-size: 10px; color: white; background: rgba(0,0,0,0.6); padding: 2px 4px; border-radius: 3px; }

        /* 상단 포메이션 텍스트 & 점유율바 */
        .formation-display { font-size: 24px; font-weight: 900; color: white; margin-bottom: 15px; letter-spacing: 2px; }
        .auto-possession-bar {
            width: 90%; height: 20px; background: #4a5568; border-radius: 10px; margin-bottom: 15px; display: flex; overflow: hidden; font-size: 12px; font-weight: bold; text-align: center; line-height: 20px;
        }
        .poss-us { background: #3182ce; color: white; width: 50%; transition: width 0.3s; }
        .poss-opp { background: #e53e3e; color: white; width: 50%; transition: width 0.3s; }

        /* 3. Right: 문자 중계 및 액션 패널 */
        .action-panel { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
        .action-btn {
            background: #4a5568; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; opacity: 0.5; pointer-events: none;
        }
        .action-panel.ready .action-btn { opacity: 1; pointer-events: auto; }
        .btn-pass { background: #38a169; } .btn-shot { background: #dd6b20; } .btn-opp { background: #e53e3e; opacity: 1 !important; pointer-events: auto !important; }
        
        .log-box { flex: 1; background: #2d3748; border-radius: 6px; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .log-item { font-size: 13px; padding: 6px; border-left: 3px solid #3182ce; background: #1a202c; }
        .log-item.opp { border-left-color: #e53e3e; }

        /* 포지션 선택 모달 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.7);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content { background: #2d3748; padding: 20px; border-radius: 12px; text-align: center; width: 300px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap; }
        .modal-btn { background: #3182ce; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="layout-left">
        <h2>벤치 / 교체 자원 (20%)</h2>
        <div class="bench-list" id="benchList">
            <div class="player-card" draggable="true" ondragstart="dragStart(event)" id="p_1">민지</div>
            <div class="player-card" draggable="true" ondragstart="dragStart(event)" id="p_2">화인</div>
            <div class="player-card" draggable="true" ondragstart="dragStart(event)" id="p_3">수연</div>
            <div class="player-card" draggable="true" ondragstart="dragStart(event)" id="p_4">효린(GK)</div>
            <div class="player-card" draggable="true" ondragstart="dragStart(event)" id="p_5">혜은</div>
            <div class="player-card" draggable="true" ondragstart="dragStart(event)" id="p_6">인선</div>
        </div>
    </div>

    <div class="layout-center">
        <div class="formation-display" id="formationText">포메이션: 대기중</div>
        
        <div class="auto-possession-bar">
            <div class="poss-us" id="barUs">우리볼 50%</div>
            <div class="poss-opp" id="barOpp">상대볼 50%</div>
        </div>

        <div class="pitch" id="pitchArea" ondragover="allowDrop(event)" ondrop="dropOnPitch(event)">
            </div>
    </div>

    <div class="layout-right">
        <h2>문자 중계 및 기록 (30%)</h2>
        
        <div class="action-panel" id="actionPanel">
            <button class="action-btn btn-pass" onclick="logAction('패스 성공', 'us')">패스 성공 ✔️</button>
            <button class="action-btn btn-shot" onclick="logAction('슈팅', 'us')">슈팅 슛 ⚽</button>
            <button class="action-btn btn-pass" onclick="logAction('경합 승리', 'us')">경합 승리 ⚔️</button>
            <button class="action-btn btn-opp" onclick="logAction('상대 볼 획득', 'opp')">상대 볼 전환 🛑</button>
        </div>

        <div class="log-box" id="logBox">
            <div class="log-item">[00:00] 경기 시작</div>
        </div>
    </div>

    <div class="modal-overlay" id="positionModal">
        <div class="modal-content">
            <h3>포지션 상세 선택</h3>
            <p id="modalPlayerName" style="color:#ecc94b; font-weight:bold;"></p>
            <p style="font-size:12px; color:#a0aec0;">해당 위치의 정확한 역할을 선택하세요.</p>
            <div class="modal-buttons" id="modalButtons">
                </div>
        </div>
    </div>

    <script>
        // --- 1. 드래그 앤 드롭 및 포메이션 로직 ---
        let draggedPlayerId = null;
        let tempDropData = null; // 모달을 띄우기 전 임시 저장 데이터
        const pitchData = []; // 경기장 위 선수 정보 저장 배열

        function dragStart(e) {
            draggedPlayerId = e.target.id;
        }

        function allowDrop(e) {
            e.preventDefault();
        }

        function dropOnPitch(e) {
            e.preventDefault();
            if (!draggedPlayerId) return;

            const pitch = document.getElementById('pitchArea');
            const rect = pitch.getBoundingClientRect();
            
            // 퍼센티지(%) 좌표 계산 (반응형 대응)
            let xPerc = ((e.clientX - rect.left) / rect.width) * 100;
            let yPerc = ((e.clientY - rect.top) / rect.height) * 100;

            const playerElem = document.getElementById(draggedPlayerId);
            const playerName = playerElem.innerText;

            // 좌표에 따른 추천 포지션 후보 산출 로직
            let options = [];
            if (yPerc < 33) {
                // 수비 진영 (위쪽이 수비라고 가정)
                if (xPerc < 30) options = ['LB', 'LWB'];
                else if (xPerc > 70) options = ['RB', 'RWB'];
                else options = ['CB', 'SW', 'GK'];
            } else if (yPerc < 66) {
                // 미드 진영
                if (xPerc < 30) options = ['LM', 'LW'];
                else if (xPerc > 70) options = ['RM', 'RW'];
                else options = ['CM', 'CDM', 'CAM'];
            } else {
                // 공격 진영
                if (xPerc < 30) options = ['LW', 'LF'];
                else if (xPerc > 70) options = ['RW', 'RF'];
                else options = ['ST', 'CF'];
            }

            // 모달 띄우기
            tempDropData = { id: draggedPlayerId, name: playerName, x: xPerc, y: yPerc, elem: playerElem };
            showPositionModal(playerName, options);
        }

        // --- 2. 포지션 미세 조정 모달 로직 ---
        function showPositionModal(name, options) {
            document.getElementById('modalPlayerName').innerText = name + " 선수의 역할";
            const btnContainer = document.getElementById('modalButtons');
            btnContainer.innerHTML = ''; // 초기화

            options.forEach(pos => {
                let btn = document.createElement('button');
                btn.className = 'modal-btn';
                btn.innerText = pos;
                btn.onclick = () => confirmPosition(pos);
                btnContainer.appendChild(btn);
            });

            document.getElementById('positionModal').style.display = 'flex';
        }

        function confirmPosition(selectedPosition) {
            document.getElementById('positionModal').style.display = 'none';

            // 1. 경기장에 토큰 생성
            createToken(tempDropData.name, selectedPosition, tempDropData.x, tempDropData.y);
            
            // 2. 벤치에서 해당 선수 숨기기 (또는 삭제)
            tempDropData.elem.style.display = 'none';
            
            // 3. 포메이션 텍스트 업데이트 
            updateFormationText();

            draggedPlayerId = null;
            tempDropData = null;
        }

        function createToken(name, pos, x, y) {
            const pitch = document.getElementById('pitchArea');
            const token = document.createElement('div');
            token.className = 'player-token';
            token.style.left = x + '%';
            token.style.top = y + '%';
            token.innerText = name.substring(0, 2); // 이름 2글자만
            token.dataset.name = name;
            token.dataset.pos = pos;

            const posLabel = document.createElement('div');
            posLabel.className = 'token-pos';
            posLabel.innerText = pos;
            token.appendChild(posLabel);

            // 토큰 클릭 시 (선택 및 야매 점유율 발동)
            token.onclick = () => selectPitchPlayer(token, name, pos);
            
            pitch.appendChild(token);
            pitchData.push({ name, pos, x, y, elem: token });
        }

        function updateFormationText() {
            // 야매 포메이션 계산 (DF수 - MF수 - FW수)
            let df = 0, mf = 0, fw = 0;
            pitchData.forEach(p => {
                if (p.pos.includes('B')) df++;
                else if (p.pos.includes('M')) mf++;
                else if (p.pos.includes('F') || p.pos.includes('S') || p.pos.includes('W')) fw++;
            });
            document.getElementById('formationText').innerText = `포메이션: ${df}-${mf}-${fw}`;
        }

        // --- 3. 스마트 터치 & 야매 점유율 로직 ---
        let selectedToken = null;
        let usPossTime = 50; // 초기 50%
        let oppPossTime = 50;

        function selectPitchPlayer(token, name, pos) {
            // 기존 선택 해제
            document.querySelectorAll('.player-token').forEach(t => t.classList.remove('selected'));
            
            token.classList.add('selected');
            selectedToken = name;
            document.getElementById('actionPanel').classList.add('ready');

            // [야매 점유율 발동] 선수를 터치하는 순간 '우리 팀'이 공을 잡은 것으로 간주!
            adjustPossession(true);
        }

        function adjustPossession(isUs) {
            if (isUs) {
                if(usPossTime < 90) { usPossTime += 5; oppPossTime -= 5; }
            } else {
                if(oppPossTime < 90) { oppPossTime += 10; usPossTime -= 10; } // 상대가 뺏으면 팍 깎임
            }
            document.getElementById('barUs').style.width = usPossTime + '%';
            document.getElementById('barUs').innerText = `우리볼 ${usPossTime}%`;
            document.getElementById('barOpp').style.width = oppPossTime + '%';
            document.getElementById('barOpp').innerText = `상대볼 ${oppPossTime}%`;
        }

        function logAction(action, team) {
            const logBox = document.getElementById('logBox');
            const logItem = document.createElement('div');
            
            let timeStr = new Date().toTimeString().split(' ')[0]; // 임시 시간

            if (team === 'us' && selectedToken) {
                logItem.className = 'log-item';
                logItem.innerHTML = `[${timeStr}] <b>${selectedToken}</b> - ${action}`;
                adjustPossession(true); // 액션 성공시 우리 점유율 추가 상승
                
                // 선택 초기화
                document.querySelectorAll('.player-token').forEach(t => t.classList.remove('selected'));
                selectedToken = null;
                document.getElementById('actionPanel').classList.remove('ready');
            } else if (team === 'opp') {
                logItem.className = 'log-item opp';
                logItem.innerHTML = `[${timeStr}] <b>상대팀</b> - ${action}`;
                adjustPossession(false); // 상대 볼로 전환
                document.getElementById('actionPanel').classList.remove('ready');
            }

            logBox.prepend(logItem);
        }
    </script>
</body>
</html>
